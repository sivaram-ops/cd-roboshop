image:
  repository: sivaram0101/frontend-roboshop
  tag: "v8"

service:
  port: 80
  targetPort: 8080

podSecurityContext:
  runAsUser: 101
  runAsGroup: 101
  fsGroup: 101

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

startupProbe:
  tcpSocket: null
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 20

readinessProbe:
  tcpSocket: null
  httpGet:
    path: /
    port: 8080

livenessProbe:
  tcpSocket: null
  httpGet:
    path: /
    port: 8080

configMap:
  enabled: true
  data:
    nginx.conf: |
      worker_processes auto;
      pid /tmp/nginx.pid;
      
      events {
        worker_connections 1024;
      }
      
      http {
        include /etc/nginx/mime.types;
        client_max_body_size 10m;
        
        server {
          listen 8080;
          
          # CRITICAL: These tell K8s to use the writable /tmp volume 
          # instead of the read-only root filesystem!
          client_body_temp_path /tmp/client_temp;
          proxy_temp_path       /tmp/proxy_temp_path;
          fastcgi_temp_path     /tmp/fastcgi_temp;
          uwsgi_temp_path       /tmp/uwsgi_temp;
          scgi_temp_path        /tmp/scgi_temp;

          location / { 
            root /usr/share/nginx/html; 
            index index.html; 
          }
          location /api/catalogue/ { proxy_pass http://catalogue:8080/; }
          location /api/user/ { proxy_pass http://user:8080/; }
          location /api/cart/ { proxy_pass http://cart:8080/; }
          location /api/shipping/ { proxy_pass http://shipping:8080/; }
          location /api/payment/ { proxy_pass http://payment:8080/; }
        }
      }

volumeMounts:
  - name: nginx-config-volume
    mountPath: /etc/nginx/nginx.conf
    subPath: nginx.conf
  - name: tmp-volume
    mountPath: /tmp

volumes:
  - name: nginx-config-volume
    configMap:
      name: frontend-config
  - name: tmp-volume
    emptyDir: {}

ingress:
  enabled: true
  hosts:
    - host: localhost
      paths:
        - path: /
          pathType: Prefix