# roboshop-microservice/values.yaml

isStatefulSet: false

replicaCount: 2

image:
  repository: ""
  tag: "v11"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

livenessProbe:
  tcpSocket:
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 10
readinessProbe:
  tcpSocket:
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 10
startupProbe:
  tcpSocket:
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 10

configMap:
  enabled: false
  data: {}

secret:
  enabled: false
  data: {}

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

pdb:
  enabled: true
  maxUnavailable: 1

# Added the ingress block to prevent the nil pointer panic.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

# Added empty defaults for optional blocks.
env: []
envFrom: []
volumeMounts: []
volumes: []
initContainers: []
command: []
args: []
affinity: {}
volumeClaimTemplates: []
hostPath: ""
nodeName: ""